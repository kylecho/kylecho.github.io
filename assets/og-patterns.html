<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #070d1c;
    background-image:
      repeating-linear-gradient(90deg, rgba(124, 155, 255, 0.07) 0 1px, transparent 1px 72px),
      repeating-linear-gradient(0deg, rgba(124, 155, 255, 0.07) 0 1px, transparent 1px 72px);
    color: #f2f5fd;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    padding: 72px 84px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .kicker {
    font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
    font-size: 20px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(206, 220, 250, 0.58);
  }
  h1 {
    font-size: 96px;
    font-weight: 500;
    letter-spacing: -0.055em;
    line-height: 0.95;
  }
  .decks {
    margin-top: 34px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    max-width: 950px;
  }
  .chip {
    padding: 10px 22px;
    border: 1.5px solid rgba(77, 107, 255, 0.55);
    border-radius: 999px;
    color: #7c9bff;
    font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
    font-size: 21px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .meta {
    font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
    font-size: 19px;
    letter-spacing: 0.05em;
    color: rgba(206, 220, 250, 0.58);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="kicker">Kyle Cho · 5 decks · 47 cards</div>
  <div>
    <h1>Frontend patterns,<br>as drills.</h1>
    <div class="decks">
      <span class="chip">Closures</span>
      <span class="chip">Async orchestration</span>
      <span class="chip">React patterns</span>
      <span class="chip">Async UI</span>
      <span class="chip">System design</span>
    </div>
  </div>
  <div class="meta"><span>kylecho.com/patterns/</span><span>Recall trains better than rereading</span></div>
</body>
</html>
