<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #070d1c;
    background-image:
      repeating-linear-gradient(90deg, rgba(124, 155, 255, 0.07) 0 1px, transparent 1px 72px),
      repeating-linear-gradient(0deg, rgba(124, 155, 255, 0.07) 0 1px, transparent 1px 72px);
    color: #f2f5fd;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    padding: 72px 84px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .kicker {
    font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
    font-size: 20px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(206, 220, 250, 0.58);
  }
  h1 {
    font-size: 92px;
    font-weight: 500;
    letter-spacing: -0.055em;
    line-height: 0.98;
    max-width: 1000px;
  }
  .sub {
    margin-top: 30px;
    font-size: 29px;
    letter-spacing: -0.015em;
    color: rgba(226, 235, 255, 0.82);
    max-width: 880px;
    line-height: 1.45;
  }
  .meta {
    font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
    font-size: 19px;
    letter-spacing: 0.05em;
    color: rgba(206, 220, 250, 0.58);
    display: flex;
    justify-content: space-between;
  }
  .accent { color: #7c9bff; }
</style>
</head>
<body>
  <div class="kicker" id="kicker"></div>
  <div>
    <h1 id="title"></h1>
    <p class="sub" id="sub"></p>
  </div>
  <div class="meta"><span id="url"></span><span id="tag"></span></div>
  <script>
    const params = new URLSearchParams(location.search);
    for (const id of ["kicker", "title", "sub", "url", "tag"]) {
      document.getElementById(id).textContent = params.get(id) || "";
    }
  </script>
</body>
</html>
